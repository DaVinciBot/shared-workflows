name: Shared E2E

on:
  workflow_call:
    inputs:
      pnpm_version:
        description: pnpm version to install.
        required: false
        type: string
        default: '11.5.2'
      node_version_file:
        description: Node version file path.
        required: false
        type: string
        default: .nvmrc
      e2e_command:
        description: E2E command.
        required: false
        type: string
        default: pnpm test:e2e
    secrets:
      NIXPACKS_NODE_VERSION:
        required: false
      PUBLIC_SUPABASE_URL:
        required: false
      PUBLIC_SUPABASE_PUBLISHABLE_KEY:
        required: false
      PACKAGES_READ_TOKEN:
        description: Token with read:packages used to install private @davincibot packages.
        required: false

permissions:
  contents: read

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NIXPACKS_NODE_VERSION: ${{ secrets.NIXPACKS_NODE_VERSION || '22' }}
      PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL || 'https://project.supabase.co' }}
      PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.PUBLIC_SUPABASE_PUBLISHABLE_KEY || 'local-anon-key' }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm_version }}

      - uses: actions/setup-node@v7
        with:
          node-version-file: ${{ inputs.node_version_file }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN }}

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Run e2e tests
        run: ${{ inputs.e2e_command }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
