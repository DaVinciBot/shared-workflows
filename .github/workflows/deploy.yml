name: Shared Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: Target environment name.
        required: true
        type: string
      image_name:
        description: Image name without tag, e.g. ghcr.io/davincibot/admin. Defaults to ghcr.io/<repo>.
        required: false
        type: string
        default: ''
      health_url:
        description: URL polled after deploy to confirm the app is healthy.
        required: true
        type: string
    secrets:
      WATCHTOWER_URL:
        required: true
      WATCHTOWER_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy ${{ inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.environment }}
    steps:
      - name: Resolve image reference
        id: image
        env:
          IMAGE_NAME: ${{ inputs.image_name }}
          REPOSITORY: ${{ github.repository }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          name="$IMAGE_NAME"
          if [ -z "$name" ]; then
            name="ghcr.io/${REPOSITORY,,}"
          fi
          case "$ENVIRONMENT" in
            prod) tag="main" ;;
            *) tag="$ENVIRONMENT" ;;
          esac
          echo "ref=${name}:${tag}" >> "$GITHUB_OUTPUT"
          echo "Triggering update for: ${name}:${tag}"

      - name: Trigger Watchtower update
        env:
          WATCHTOWER_URL: ${{ secrets.WATCHTOWER_URL }}
          WATCHTOWER_TOKEN: ${{ secrets.WATCHTOWER_TOKEN }}
          IMAGE_REF: ${{ steps.image.outputs.ref }}
        run: |
          response="$(curl -fsS -X POST \
            -H "Authorization: Bearer $WATCHTOWER_TOKEN" \
            "$WATCHTOWER_URL/v1/update?image=$IMAGE_REF")"
          echo "$response" | jq .

          failed="$(echo "$response" | jq -r '.summary.failed // 0')"
          if [ "$failed" != "0" ]; then
            echo "::error::Watchtower reported $failed failed update(s)."
            exit 1
          fi

      - name: Wait for health check
        env:
          HEALTH_URL: ${{ inputs.health_url }}
        run: |
          sleep 5
          for attempt in $(seq 1 30); do
            status="$(curl -s -o /dev/null -w '%{http_code}' "$HEALTH_URL" || echo 000)"
            if [ "$status" = "200" ]; then
              echo "Healthy after $attempt attempt(s)."
              exit 0
            fi
            echo "Attempt $attempt/30: $HEALTH_URL returned $status, retrying in 10s..."
            sleep 10
          done
          echo "::error::$HEALTH_URL did not return 200 within 5 minutes."
          exit 1
