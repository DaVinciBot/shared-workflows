name: Shared Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: Target environment name.
        required: true
        type: string
      image_ref:
        description: Image reference to deploy, as image@sha256:digest. Defaults to ghcr.io/<repo>:<environment>.
        required: false
        type: string
        default: ''
      health_url:
        description: URL polled after deploy to confirm the app is healthy.
        required: true
        type: string
      allow_missing_config:
        description: Skip deployment when Dokploy is not configured for this environment.
        required: false
        type: boolean
        default: false
    secrets:
      DOKPLOY_URL:
        required: true
      DOKPLOY_API_KEY:
        required: true
      DOKPLOY_APP_ID:
        required: true
      GHCR_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy ${{ inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.environment }}
    steps:
      - name: Check Dokploy configuration
        id: config
        env:
          DOKPLOY_APP_ID: ${{ secrets.DOKPLOY_APP_ID }}
          ALLOW_MISSING_CONFIG: ${{ inputs.allow_missing_config }}
        run: |
          if [ -z "$DOKPLOY_APP_ID" ]; then
            if [ "$ALLOW_MISSING_CONFIG" = "true" ]; then
              echo "::notice::Dokploy is not configured for ${{ inputs.environment }}; skipping deployment."
              echo "enabled=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "::error::DOKPLOY_APP_ID is not configured for environment ${{ inputs.environment }}."
            exit 1
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Resolve image reference
        id: image
        if: steps.config.outputs.enabled == 'true'
        env:
          IMAGE_REF: ${{ inputs.image_ref }}
          DEFAULT_IMAGE_REF: ghcr.io/${{ github.repository }}:${{ inputs.environment }}
        run: |
          ref="${IMAGE_REF:-${DEFAULT_IMAGE_REF,,}}"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "Deploying image: $ref"

      - name: Pin image digest
        if: steps.config.outputs.enabled == 'true'
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_APP_ID: ${{ secrets.DOKPLOY_APP_ID }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          IMAGE_REF: ${{ steps.image.outputs.ref }}
        run: |
          payload="$(jq -n \
            --arg appId "$DOKPLOY_APP_ID" \
            --arg image "$IMAGE_REF" \
            --arg user "$GHCR_USER" \
            --arg pass "$GHCR_TOKEN" \
            '{applicationId: $appId, dockerImage: $image, username: $user, password: $pass, registryUrl: "ghcr.io"}')"

          curl -fsS \
            -X POST \
            -H "x-api-key: $DOKPLOY_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$DOKPLOY_URL/api/application.saveDockerProvider"

      - name: Trigger deployment
        if: steps.config.outputs.enabled == 'true'
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_APP_ID: ${{ secrets.DOKPLOY_APP_ID }}
        run: |
          payload="$(jq -n --arg appId "$DOKPLOY_APP_ID" '{applicationId: $appId}')"

          curl -fsS \
            -X POST \
            -H "x-api-key: $DOKPLOY_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$DOKPLOY_URL/api/application.deploy"

      - name: Wait for health check
        if: steps.config.outputs.enabled == 'true'
        env:
          HEALTH_URL: ${{ inputs.health_url }}
        run: |
          for attempt in $(seq 1 30); do
            status="$(curl -s -o /dev/null -w '%{http_code}' "$HEALTH_URL" || echo 000)"
            if [ "$status" = "200" ]; then
              echo "Healthy after $attempt attempt(s)."
              exit 0
            fi
            echo "Attempt $attempt/30: $HEALTH_URL returned $status, retrying in 10s..."
            sleep 10
          done

          echo "::error::$HEALTH_URL did not return 200 within 5 minutes."
          exit 1
