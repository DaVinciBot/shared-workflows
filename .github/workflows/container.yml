name: Shared Container

on:
  workflow_call:
    inputs:
      push:
        description: Push the image to GHCR.
        required: false
        type: boolean
        default: false
      image_name:
        description: Full image name. Defaults to ghcr.io/<owner>/<repo>.
        required: false
        type: string
        default: ''
      context:
        description: Docker build context.
        required: false
        type: string
        default: .
      dockerfile:
        description: Dockerfile path.
        required: false
        type: string
        default: ./Dockerfile
      trivy_severity:
        description: Severity gate for the published image scan.
        required: false
        type: string
        default: CRITICAL
    outputs:
      image:
        description: Image name.
        value: ${{ jobs.container.outputs.image }}
      digest:
        description: Published image digest.
        value: ${{ jobs.container.outputs.digest }}

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

jobs:
  container:
    name: Container Image
    runs-on: ubuntu-latest
    timeout-minutes: 35
    outputs:
      image: ${{ steps.export.outputs.image }}
      digest: ${{ steps.export.outputs.digest }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set image name
        run: |
          IMAGE_NAME="${{ inputs.image_name }}"
          if [ -z "$IMAGE_NAME" ]; then
            IMAGE_NAME="ghcr.io/${{ github.repository }}"
          fi
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: inputs.push
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: ${{ inputs.push }}
          sbom: ${{ inputs.push }}

      - name: Export image metadata
        id: export
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          echo "image=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          {
            echo "image=${IMAGE_NAME}"
            echo "digest=${DIGEST}"
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } > image-metadata.txt

      - name: Upload image metadata
        uses: actions/upload-artifact@v4
        with:
          name: image-metadata
          path: image-metadata.txt
          if-no-files-found: error

      - name: Scan published image
        if: inputs.push && steps.build.outputs.digest != ''
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: table
          vuln-type: os,library
          severity: ${{ inputs.trivy_severity }}
          ignore-unfixed: true
          exit-code: '1'

      - name: Generate image SBOM
        if: inputs.push && steps.build.outputs.digest != ''
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: image-sbom.spdx.json

      - name: Upload image SBOM
        if: inputs.push && steps.build.outputs.digest != ''
        uses: actions/upload-artifact@v4
        with:
          name: image-sbom
          path: image-sbom.spdx.json
          if-no-files-found: error

      - name: Install Cosign
        if: inputs.push && steps.build.outputs.digest != ''
        uses: sigstore/cosign-installer@v3

      - name: Sign published image
        if: inputs.push && steps.build.outputs.digest != ''
        env:
          IMAGE_REF: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE_REF"
