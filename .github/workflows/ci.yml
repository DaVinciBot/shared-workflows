name: Shared CI

on:
  workflow_call:
    inputs:
      pnpm_version:
        description: pnpm version to install.
        required: false
        type: string
        default: '10.33.0'
      node_version_file:
        description: Node version file path.
        required: false
        type: string
        default: .nvmrc
    secrets:
      NIXPACKS_NODE_VERSION:
        required: false
      PUBLIC_SUPABASE_URL:
        required: false
      PUBLIC_SUPABASE_PUBLISHABLE_KEY:
        required: false

permissions:
  contents: read

jobs:
  quality-gates:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NIXPACKS_NODE_VERSION: ${{ secrets.NIXPACKS_NODE_VERSION || '22' }}
      PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL || 'https://project.supabase.co' }}
      PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.PUBLIC_SUPABASE_PUBLISHABLE_KEY || 'local-anon-key' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Typecheck
            command: pnpm check
          - name: Lint
            command: pnpm lint
          - name: Unit Tests
            command: pnpm test:unit
          - name: Build
            command: pnpm build
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm_version }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: ${{ inputs.node_version_file }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ${{ matrix.name }}
        run: ${{ matrix.command }}
