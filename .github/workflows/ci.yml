name: Shared CI

on:
  workflow_call:
    inputs:
      pnpm_version:
        description: pnpm version to install.
        required: false
        type: string
        default: '11.5.2'
      node_version_file:
        description: Node version file path.
        required: false
        type: string
        default: .nvmrc
      working_directory:
        description: >-
          Directory in which the quality-gate commands run. Dependencies are
          always installed from the repository root so pnpm workspaces link
          correctly; only the commands run here. Defaults to the repo root.
        required: false
        type: string
        default: '.'
      commands:
        description: >-
          JSON array of {name, command} objects to run as the quality-gate
          matrix. Use it to run only the scripts a given package actually
          defines. When empty, the default gates (check, lint, test:unit,
          build) run at the repository root.
        required: false
        type: string
        default: ''
    secrets:
      NIXPACKS_NODE_VERSION:
        required: false
      PUBLIC_SUPABASE_URL:
        required: false
      PUBLIC_SUPABASE_PUBLISHABLE_KEY:
        required: false
      PACKAGES_READ_TOKEN:
        description: Token with read:packages used to install private @davincibot packages.
        required: false

permissions:
  contents: read

jobs:
  quality-gates:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NIXPACKS_NODE_VERSION: ${{ secrets.NIXPACKS_NODE_VERSION || '22' }}
      PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL || 'https://project.supabase.co' }}
      PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.PUBLIC_SUPABASE_PUBLISHABLE_KEY || 'local-anon-key' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.commands != '' && inputs.commands || '[{"name":"Typecheck","command":"pnpm check"},{"name":"Lint","command":"pnpm lint"},{"name":"Unit Tests","command":"pnpm test:unit"},{"name":"Build","command":"pnpm build"}]') }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm_version }}

      - uses: actions/setup-node@v7
        with:
          node-version-file: ${{ inputs.node_version_file }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN }}

      - name: Run ${{ matrix.name }}
        run: ${{ matrix.command }}
        working-directory: ${{ inputs.working_directory }}
